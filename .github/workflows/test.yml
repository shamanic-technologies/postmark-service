name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify drizzle migrations exist
        run: |
          test -f drizzle/meta/_journal.json || (echo "ERROR: drizzle/meta/_journal.json missing. Run 'npm run db:generate' and commit the drizzle/ folder." && exit 1)

      - name: Run unit tests
        run: npm run test:unit

      - name: Create Neon branch for PR
        if: github.event_name == 'pull_request'
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Push schema to database
        if: github.event_name == 'pull_request'
        run: npx drizzle-kit push --force
        env:
          POSTMARK_SERVICE_DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}

      - name: Run integration tests
        if: github.event_name == 'pull_request'
        run: npm run test:integration
        env:
          POSTMARK_SERVICE_DATABASE_URL: ${{ steps.neon.outputs.db_url_pooled }}
          POSTMARK_SERVICE_API_KEY: test-secret-key

      - name: Delete Neon branch
        if: github.event_name == 'pull_request' && always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
